<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Download BeachQuest</title>
  <meta name="description" content="Download BeachQuest on iOS and Android." />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KSW8ZSRVSM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-KSW8ZSRVSM");
  </script>

  <script>
    const playStoreUrl = "https://play.google.com/store/apps/details?id=gr.sterna.beach_app";
    const appStoreUrl = "https://apps.apple.com/app/id6761381406";

    function detectPlatform() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera || "";

      const isAndroid = /android/i.test(userAgent);

      const isIOS =
        /iPad|iPhone|iPod/.test(userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isAndroid) return "android";
      if (isIOS) return "ios";
      return "desktop";
    }

    function trackEvent(eventName, platform) {
      try {
        if (typeof gtag !== "function") return;

        gtag("event", eventName, {
          event_category: "app_download_page",
          platform: platform,
          page_path: window.location.pathname
        });
      } catch (e) {
        // Keep page working even if analytics fails
      }
    }

    function trackEventThenGo(eventName, platform, url) {
      let redirected = false;

      function go() {
        if (redirected) return;
        redirected = true;
        window.location.href = url;
      }

      try {
        if (typeof gtag !== "function") {
          go();
          return;
        }

        gtag("event", eventName, {
          event_category: "app_download_page",
          platform: platform,
          page_path: window.location.pathname,
          transport_type: "beacon",
          event_callback: go,
          event_timeout: 500
        });

        setTimeout(go, 700);
      } catch (e) {
        go();
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const platform = detectPlatform();

      trackEvent("app_page_opened", platform);

      const iosButton = document.getElementById("iosDownloadButton");
      const androidButton = document.getElementById("androidDownloadButton");

      iosButton.addEventListener("click", function (e) {
        e.preventDefault();
        trackEventThenGo("manual_click_ios", platform, appStoreUrl);
      });

      androidButton.addEventListener("click", function (e) {
        e.preventDefault();
        trackEventThenGo("manual_click_android", platform, playStoreUrl);
      });

      setTimeout(() => {
        if (platform === "android") {
          trackEventThenGo("auto_redirect_android", "android", playStoreUrl);
        } else if (platform === "ios") {
          trackEventThenGo("auto_redirect_ios", "ios", appStoreUrl);
        }
      }, 700);
    });
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f6fafe;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #102033;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      background: white;
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      color: #5f6b7a;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    a {
      display: block;
      text-decoration: none;
      color: white;
      background: #157cff;
      padding: 15px 18px;
      border-radius: 16px;
      font-weight: bold;
      margin-top: 12px;
    }

    .secondary {
      background: #102033;
    }

    .small {
      font-size: 13px;
      color: #8a94a3;
      margin-top: 18px;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="emoji">🏖️</div>

    <h1>Get BeachQuest 🌊</h1>

    <p>
      Find your beach. Not the tourist one.<br />
      I’ll show you where to go.
    </p>

    <a id="iosDownloadButton" href="https://apps.apple.com/app/id6761381406">
      Download on App Store
    </a>

    <a
      id="androidDownloadButton"
      class="secondary"
      href="https://play.google.com/store/apps/details?id=gr.sterna.beach_app"
    >
      Get it on Google Play
    </a>

    <p class="small">
      Redirecting you automatically...
    </p>
  </div>
</body>
</html>
