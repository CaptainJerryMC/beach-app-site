<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Download BeachQuest</title>
  <meta name="description" content="Download BeachQuest on iOS and Android." />

  <script>
    const playStoreUrl = "https://play.google.com/store/apps/details?id=gr.sterna.beach_app";
    const appStoreUrl = "https://apps.apple.com/app/id6761381406";
    const fallbackUrl = "https://beachquest.gr/app";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    setTimeout(() => {
      if (/android/i.test(userAgent)) {
        window.location.href = playStoreUrl;
      } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.href = appStoreUrl;
      }
    }, 700);
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f6fafe;
      display: flex;

      justify-content: center;
      text-align: center;
      color: #102033;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      background: white;
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    }

    img {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      color: #5f6b7a;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    a {
      display: block;
      text-decoration: none;
      color: white;
      background: #157cff;
      padding: 15px 18px;
      border-radius: 16px;
      font-weight: bold;
      margin-top: 12px;
    }

    .secondary {
      background: #102033;
    }

    .small {
      font-size: 13px;
      color: #8a94a3;
      margin-top: 18px;
      margin-bottom: 0;
    }
  </style>
</head>

<body>

    <a href="https://apps.apple.com/app/id6761381406">

    <a class="secondary" href="https://play.google.com/store/apps/details?id=gr.sterna.beach_app">

    <p class="small">
